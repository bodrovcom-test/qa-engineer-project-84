---
test_cases:
  - id: 1
    summary: Проверка поиска товаров по ключевому слову
    requirement: Пользователь должен иметь возможность искать товары по ключевому слову
    prerequisites:
      - Магазин доступен по адресу: https://products-store.hexlet.app
    test_data:
      keyword: eggs
    steps:
      - action: Открыть главную страницу магазина по ссылке
          https://products-store.hexlet.app
        expected_result: Главная страница загружается успешно
      - action: Перейти в поле поиска
        expected_result: Поле поиска активно для ввода данных
      - action: Ввести ключевое слово 'eggs' в строку поиска
        expected_result: Результаты поиска содержат товары, соответствующие запросу 'eggs'
      - action: Выбрать первый найденный товар
        expected_result: Переход на карточку выбранного товара осуществляется успешно
  - id: 2
    summary: Проверка поиска товаров по категории
    requirement: Пользователь должен иметь возможность искать товары по категории
    prerequisites:
      - Магазин доступен по адресу: https://products-store.hexlet.app
    test_data:
      category: Бакалейные товары
    steps:
      - action: Открыть главную страницу магазина по ссылке
          https://products-store.hexlet.app
        expected_result: Главная страница загружается успешно
      - action: Нажать на кнопку «Категория»
        expected_result: Открывается выпадающее меню
      - action: Выбрать категорию 'бакалейные товары'
        expected_result: Отображаются товары из категории 'бакалейные товары'
      - action: Просмотреть список товаров
        expected_result: Список товаров соответствует выбранному фильтру 'бакалейные товары'
  - id: 3
    summary: Проверка фильтрации товаров по параметру "Производитель"
    requirement: Пользователь должен иметь возможность фильтровать товары по производителю
    prerequisites:
      - Магазин доступен по адресу: https://products-store.hexlet.app
    test_data:
      manufacturer: Calvin Klein
    steps:
      - action: Открыть главную страницу магазина по ссылке
          https://products-store.hexlet.app
        expected_result: Главная страница загружается успешно
      - action: Перейти в каталог товаров
        expected_result: Загружается страница каталога товаров
      - action: Применить фильтр по производителю "Calvin Klein"
        expected_result: Отображены только товары производства Calvin Klein
  - id: 4
    summary: Проверка фильтрации товаров по параметру "В наличии"
    requirement: Пользователь должен иметь возможность фильтровать товары по наличию
    prerequisites:
