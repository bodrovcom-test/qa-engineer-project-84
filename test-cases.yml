# Тест-кейс №18: Негативный сценарий — Поиск товаров по отсутствующему или некорректному ключевому слову

summary: Проверка реакции приложения на поиск товаров по отсутствующим или некорректным ключевым словам
requirement: Приложение должно корректно реагировать на ввод неизвестных ключевых слов или некорректных поисковых запросов
prerequisites:
  - Магазин доступен по адресу: https://products-store.hexlet.app
steps:
  - action: Открыть главную страницу магазина по ссылке https://products-store.hexlet.app
    expected_result: Главная страница загружается успешно
  - action: Перейти на страницу поиска
    expected_result: Страница поиска отображается корректно
  - action: Ввести некорректное ключевое слово '%^&*' в строку поиска
    expected_result: Результат поиска пуст, выводится сообщение вида "Ничего не найдено"
  - action: Попробовать поиск по пустому запросу ''
    expected_result: Выводятся все товары (без фильтров)
  - action: Ввести случайное бессмысленное слово 'вапрп'
    expected_result: Результат поиска пуст, выводится сообщение "Ничего не найдено"
  - action: Ввести сложное и маловероятное сочетание букв и цифр 'zzz999'
    expected_result: Результат поиска пуст, выводится сообщение "Ничего не найдено"
  - action: Повторные поиски с разными комбинациями знаков и чисел
    expected_result: Независимо от комбинации символов, результат остаётся неизменным — выводится информационное сообщение "Ничего не найдено"


 







