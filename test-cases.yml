# Тест-кейс №17: Отправка данных заказа на сервер
    summary: Проверка отправки данных заказа на сервер
    requirement: Магазин должен отправлять данные заказа на сервер
    prerequisites:
      - Магазин доступен по адресу: https://products-store.hexlet.app
    steps:
      - action: Открыть главную страницу магазина по ссылке https://products-store.hexlet.app
        expected_result: Главная страница загружается успешно
      - action: Перейти в каталог товаров
        expected_result: Загружается страница каталога товаров
      - action: Найти интересующий товар и добавить его в корзину
        expected_result: Товар успешно добавлен в корзину
      - action: Перейти в корзину
        expected_result: Корзина отображает добавленный товар и итоговую сумму
      - action: Нажать кнопку «Оформить заказ»
        expected_result: Открывается форма для ввода данных заказа (ФИО, адрес доставки, способ оплаты)
      - action: Заполнить все обязательные поля формы и нажать кнопку «Подтвердить заказ»
        expected_result: Появляется сообщение об успешном оформлении заказа с уникальным номером заказа
      - action (технический): Открыть инструменты разработчика браузера (F12 → вкладка Network)
        expected_result: Инструменты разработчика открыты, вкладка Network активна
      - action (технический): В фильтре Network ввести ключевые слова (order, checkout) и найти запрос, связанный с передачей данных заказа на сервер
        expected_result: В списке запросов виден POST-запрос к эндпоинту оформления заказа со статусом HTTP 200 OK
      - action (технический): Просмотреть детали запроса (Headers, Payload) и ответа сервера (Response)
        expected_result:
          - В Payload передаются корректные данные заказа (товары, количество, итоговая сумма, контактные данные пользователя)
          - В Response содержится подтверждение принятия заказа с кодом успеха (HTTP 200 OK) и данными заказа (ID, статус и т. д.)
      - action: Проверить получение уведомления (email/SMS) или наличие заказа в админ-панели
        expected_result: Пользователь получает уведомление с номером заказа, заказ отображается в системе

  # Тест-кейс №18: Негативный сценарий — Поиск товаров по отсутствующему или некорректному ключевому слову
    summary: Негативный сценарий — поиск товаров по отсутствующему или некорректному ключевому слову
    requirement: Приложение должно корректно реагировать на ввод неизвестных ключевых слов или некорректных поисковых запросов
    prerequisites:
      - Магазин доступен по адресу: https://products-store.hexlet.app
    steps:
      - action: Открыть главную страницу магазина по ссылке https://products-store.hexlet.app
        expected_result: Главная страница загружается успешно
      - action: Перейти к строке поиска на главной странице
        expected_result: Поле поиска доступно и активно
      - action: Ввести некорректное ключевое слово '%^&*' в строку поиска, нажать Enter
        expected_result: Результат поиска пуст, отображается сообщение «Ничего не найдено» или аналогичное, подсказка с возможными вариантами отсутствует
      - action: Очистить поле поиска, оставить его пустым, нажать кнопку поиска
        expected_result: Отображается либо полный список товаров (без фильтров), либо выводится подсказка с просьбой ввести поисковый запрос
      - action: Ввести случайное бессмысленное слово 'вапрп' в строку поиска
        expected_result: Результат поиска пуст, выводится сообщение «Ничего не найдено»
      - action: Ввести сложное и маловероятное сочетание букв и цифр 'zzz999'
        expected_result: Результат поиска пуст, выводится сообщение «Ничего не найдено»
      - action: Выполнить несколько поисков с разными комбинациями специальных символов, цифр и букв (например, '123#@#', 'qwerty123')
        expected_result: При каждом запросе результат остаётся неизменным — выводится информационное сообщение «Ничего не найдено», интерфейс не выдаёт ошибок, не зависает, время отклика остаётся в пределах нормы
