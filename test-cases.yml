        expected_result: Загружается страница каталога товаров
      - action: Применить фильтр "В наличии"
        expected_result: Показаны только товары, имеющиеся в наличии
  - id: 5
    summary: Проверка фильтрации товаров по цене
    requirement: Пользователь должен иметь возможность фильтровать товары по цене
    prerequisites:
      - Магазин доступен по адресу: https://products-store.hexlet.app
    test_data:
      price_range: от 3 до 59 $
    steps:
      - action: Открыть главную страницу магазина по ссылке
          https://products-store.hexlet.app
        expected_result: Главная страница загружается успешно
      - action: Перейти в каталог товаров
        expected_result: Загружается страница каталога товаров
      - action: Установить диапазон цены от 3 до 59 $
        expected_result: Отображены только товары в указанном диапазоне цен
