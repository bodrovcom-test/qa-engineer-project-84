# Тест-кейс №1: проверка поиска товаров по ключевому слову

summary: Проверка поиска товаров по ключевому слову
requirement: Пользователь должен иметь возможность искать товары по ключевому слову
prerequisites:
  - Магазин доступен по адресу: https://products-store.hexlet.app
test-data:
  - Ключевое слово для поиска: eggs
steps:
  - action: Открыть главную страницу магазина по ссылке https://products-store.hexlet.app
    expected_result: Главная страница загружается успешно
  - action: Перейти в поле поиска
    expected_result: Поле поиска активно для ввода данных
  - action: Ввести ключевое слово 'eggs' в строку поиска
    expected_result: Результаты поиска содержат товары, соответствующие запросу 'eggs'
  - action: Выбрать первый найденный товар
    expected_result: Переход на карточку выбранного товара осуществляется успешно

