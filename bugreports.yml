---
- summary: |
    Проверка переключения языка интерфейса на английский
  environment: |
    Яндекс Браузер 26.3.0.2120 (официальная сборка) (64 бит)
    Выпуск	Windows 10 Pro, Версия 22H2, Дата установки ‎30.‎04.‎2024, Сборка ОС 19045.6456
  steps-to-reproduce: |
    1. Зайти на страницу https://products-store.hexlet.app/
    2. Нажать "Language"
    3. Выбрать Русский язык
  expected-result: |
    Страница полностью переводится на русский язык
  actual-result: |
    Страница переводится частично на русский язык, описание товаров остается на английском языке 
---
- summary: |
    Проверка отправки данных заказа на сервер
  environment: |
   Яндекс Браузер 26.3.0.2120 (официальная сборка) (64 бит)
    Выпуск	Windows 10 Pro, Версия 22H2, Дата установки ‎30.‎04.‎2024, Сборка ОС 19045.6456
  steps-to-reproduce: |
    1. Зайти на страницу https://products-store.hexlet.app/
