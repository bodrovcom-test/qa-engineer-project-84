    bugreports:
- summary: |
    Проверка полной очистки корзины
  environment: |
    Яндекс Браузер 26.3.0.2120 (официальная сборка) (64 бит)
    Выпуск	Windows 10 Pro, Версия 22H2, Дата установки ‎30.‎04.‎2024, Сборка ОС 19045.6456
  steps-to-reproduce: |
    - action: Открыть главную страницу магазина по ссылке https://products-store-v2.hexlet.app/
    expected_result: Главная страница загружается успешно
    - action: Перейти в каталог товаров
    expected_result: Загружается страница каталога товаров
    - action: Добавить несколько разных товаров в корзину
    expected_result: Несколько товаров успешно добавлены в корзину
    - action: Перейти в корзину
    expected_result: Корзина заполнена несколькими товарами
    - action: Использовать функцию "очистить корзину"
    expected_result: Корзина полностью очищается, становится пустой
  actual-result: |
    Очистка корзины работает некорректно. При нажатии конпки "Очистить корзину", товар с корзины пропадает, но при обновлении страницы в браузере, в корзине появляется удаленный товар. 
    ---
