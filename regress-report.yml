- summary: |
    Проверка отправки данных заказа на сервер
  environment: |
   Яндекс Браузер 26.3.0.2120 (официальная сборка) (64 бит)
    Выпуск	Windows 10 Pro, Версия 22H2, Дата установки ‎30.‎04.‎2024, Сборка ОС 19045.6456
  steps-to-reproduce: |
    - action: Открыть главную страницу магазина по ссылке https://products-store-v2.hexlet.app/
    expected_result: Главная страница загружается успешно
    - action: Перейти в каталог товаров
    expected_result: Загружается страница каталога товаров
    - action: Найти интересующий товар и добавить его в корзину
    expected_result: Товар успешно добавлен в корзину
    - action: Перейти в корзину
    expected_result: Корзина отображает добавленный товар
    - action: Нажать кнопку «Оформить заказ»
    expected_result: Cообщение об успешном оформлении заказа появляется на экране
    - action: Открыть инструменты разработчика браузера (F12 → вкладка Network)
    expected_result: Инструменты разработчика открыты
    - action: Найти запрос, связанный с передачей данных заказа на сервер
    expected_result: Виден запрос с методом POST и статусом HTTP 200 OK
    - actual-result: |
    При отправлении запроса на сервер используется метод GET, что неверно, также неверно указан адрес URL запроса. Также ошибка 500 Internal Server Error означает, что на стороне сервера произошла внутренняя ошибка
    ---
   
