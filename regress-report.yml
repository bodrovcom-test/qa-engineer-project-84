    Проверка поиска товаров по ключевому слову
  environment: |
    Яндекс Браузер 26.3.0.2120 (официальная сборка) (64 бит)
    Выпуск	Windows 10 Pro, Версия 22H2, Дата установки ‎30.‎04.‎2024, Сборка ОС 19045.6456
  steps-to-reproduce: |
    - action: Открыть главную страницу магазина по ссылке https://products-store-v2.hexlet.app/
    expected_result: Главная страница загружается успешно
    - action: Перейти в поле поиска
    expected_result: Поле поиска активно для ввода данных
    - action: Ввести ключевое слово 'eggs' в строку поиска
    expected_result: Результаты поиска содержат товары, соответствующие запросу 'eggs'
    actual-result: |
    Поиск по ключевым словам осуществляется только на странице с товарами, которую видет пользователь, а не во всем магазине 
